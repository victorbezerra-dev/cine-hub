name: cine_hub
description: "Cine Hub is a Flutter app for discovering popular movies, exploring details, and managing favorites."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.5.0
  dio: ^5.9.2
  flutter_dotenv: ^6.0.0
  go_router: ^17.2.2
  flutter_riverpod: ^3.3.1
  shared_preferences: ^2.5.3
  connectivity_plus: 7.1.1
  palette_generator_master: ^1.0.1
  cached_network_image: ^3.4.1
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.jpeg"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - .env
